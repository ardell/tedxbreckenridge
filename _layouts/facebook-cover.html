---
layout: null
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', helvetica, arial, sans-serif;
      background: #676767;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .preview-label {
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
      opacity: 0.7;
    }

    .fb-cover {
      position: relative;
      width: 1920px;
      height: 1005px;
      overflow: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .fb-cover * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .fb-cover .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }

    .fb-cover .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .fb-cover .content {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="preview-label">{{ page.format }} ({{ page.width }}×{{ page.height }})</div>
  <div class="fb-cover">
    {{ content }}
  </div>
</body>
</html>
